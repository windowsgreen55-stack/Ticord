<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ticord</title>

<style>

body{
margin:0;
background:#36393f;
font-family:sans-serif;
color:white;
height:100vh;
display:flex;
}

#servers{
width:72px;
background:#202225;
}

#channels{
width:240px;
background:#2f3136;
display:flex;
flex-direction:column;
}

#userbar{
height:52px;
background:#292b2f;
display:flex;
align-items:center;
padding:6px;
margin-top:auto;
}

#userbar img{
width:32px;
height:32px;
border-radius:50%;
margin-right:8px;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:20px;
}

.message{
display:flex;
margin-bottom:15px;
}

.message img{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

.name{
font-weight:bold;
}

#input{
padding:10px;
background:#40444b;
}

#input input{
width:100%;
padding:10px;
background:#303339;
border:none;
color:white;
}

button{
margin-left:8px;
}

</style>
</head>

<body>

<div id="servers"></div>

<div id="channels">
<div id="userbar">
<img id="avatar">
<span id="username">offline</span>
<button onclick="logout()">Logout</button>
</div>
</div>

<div id="chat">

<div id="messages"></div>

<div id="input">
<input id="msg" placeholder="Enviar mensagem">
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCXbYHebvpVacqtewv6rgK_BW1QRzxeGa0",
authDomain:"ticord-b3840.firebaseapp.com",
databaseURL:"https://ticord-b3840-default-rtdb.firebaseio.com",
projectId:"ticord-b3840",
storageBucket:"ticord-b3840.firebasestorage.app",
messagingSenderId:"555263749675",
appId:"1:555263749675:web:2112209a26aecc9f05046e"
}

firebase.initializeApp(firebaseConfig)
const db = firebase.database()

let token = sessionStorage.getItem("token")

if(!token){
token = prompt("Coloque seu token do Discord")
sessionStorage.setItem("token",token)
}

let currentUser = {}
let avatarURL = ""

fetch("https://discord.com/api/v9/users/@me",{
headers:{authorization:token}
})
.then(r=>r.json())
.then(user=>{

currentUser = user

if(user.avatar){

avatarURL =
"https://cdn.discordapp.com/avatars/"+user.id+"/"+user.avatar+".png"

}else{

const defaultAvatar = Number(user.discriminator) % 5

avatarURL =
"https://cdn.discordapp.com/embed/avatars/"+defaultAvatar+".png"

}

document.getElementById("username").innerText =
user.username+"_"+user.discriminator

document.getElementById("avatar").src = avatarURL

})

function logout(){

sessionStorage.removeItem("token")
location.reload()

}

document.getElementById("msg").addEventListener("keydown",e=>{

if(e.key==="Enter"){

const text = e.target.value

db.ref("messages").push({
user:currentUser.username+"_"+currentUser.discriminator,
avatar:avatarURL,
text:text
})

e.target.value=""

}

})

db.ref("messages").on("child_added",snap=>{

const m = snap.val()

const div = document.createElement("div")
div.className="message"

div.innerHTML = `
<img src="${m.avatar || avatarURL}">
<div>
<div class="name">${m.user}</div>
<div>${m.text}</div>
</div>
`

document.getElementById("messages").appendChild(div)

})

</script>
